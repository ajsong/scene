<body>
<label class="url"><a href="javascript:void(0)">保存</a><div>跳转网址</div><input type="text" id="url" value="{$data.url}" /></label>

<div class="article3">
	<ul class="thead">
		<li class="clear-after">
			<span>图片</span>
			<span>标题</span>
			<span>阅读量</span>
			<span>排序<em class="tips" title="数字越小，排在越前" tips-bgcolor="#444" tips-follow="right"></em></span>
			<span>滚动图</span>
			<span>操作<em class="add tips" title="添加" tips-bgcolor="#444" tips-follow="right"></em></span>
		</li>
	</ul>
	<ul class="tbody">
		{foreach from=$data.list item=g}
		<li>
			<form class="clear-after" action="?" method="post" enctype="multipart/form-data">
			<label><em style="background-image:url({$g->pic});"><input type="hidden" name="origin_pic" value="{$g->pic}" /><input type="file" name="pic" /></em></label>
			<label><input type="text" name="title" class="title" value="{$g->title}" /></label>
			<label><input type="text" name="clicks" value="{$g->clicks}" /></label>
			<label><input type="text" name="sort" value="{$g->sort}" /></label>
			<label><label class="checkbox-app"><input type="checkbox" name="category_id" value="1" {if $g->category_id==1}checked{/if} /><b></b></label></label>
			<label><a class="save tips" href="javascript:void(0)" title="保存" tips-bgcolor="#444" tips-follow="bottom"></a><a class="del tips" href="javascript:void(0)" title="删除" tips-bgcolor="#444" tips-follow="bottom"></a></label>
			<input type="hidden" name="id" class="id" value="{$g->id}" />
			</form>
		</li>
		{/foreach}
	</ul>
</div>

{include file="footer.html"}
<script>
$(function(){
	$('.thead .add').on('click', function(){
		let html = $('<li>\
			<form class="clear-after" action="?" method="post" enctype="multipart/form-data">\
			<label><em class="contain" style="background-image:url(/images/nopic.png);"><input type="file" name="pic" /></em></label>\
			<label><input type="text" name="title" class="title" placeholder="请输入标题" /></label>\
			<label><input type="text" name="clicks" value="0" /></label>\
			<label><input type="text" name="sort" value="999" /></label>\
			<label><label class="checkbox-app"><input type="checkbox" name="category_id" value="1" /><b></b></label></label>\
			<label><a class="save tips" href="javascript:void(0)" title="保存" tips-bgcolor="#444" tips-follow="bottom"></a><a class="del tips" href="javascript:void(0)" title="删除" tips-bgcolor="#444" tips-follow="bottom"></a></label>\
			<input type="hidden" name="id" class="id" value="0" />\
			</form>\
		</li>');
		$('.tbody').prepend(html);
		html.find('.tips').tips();
		window.scrollTo(0, 0);
	});
	$('.tbody').on('change', ':file', function(){
		$(this).parent().css('background-image', 'url('+URL.createObjectURL(this.files[0])+')');
	}).on('click', '.save', function(){
		let form = $(this).parent().parent();
		if(!form.find('.title').val().length){
			$.overloadError('请输入标题');
			return false;
		}
		form.submit();
	}).on('click', '.del', function(){
		let form = $(this).parent().parent();
		if(Number(form.find('.id').val())===0){
			form.parent().remove();
			return false;
		}
		if(!confirm('确定要删除吗？'))return false;
		form.attr('action', '/api/article3/delete').submit();
	});
	$('.url a').on('click', function(){
		let url = $('#url').val();
		if(!url.length){
			$.overloadError('请输入跳转网址');
			return false;
		}
		$.postJSON('/api/article3/setUrl', { url:url }, function(){
			$.overloadSuccess('保存成功');
		});
	});
});
</script>
