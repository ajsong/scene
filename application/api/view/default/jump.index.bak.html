@media (max-width: 720px) {
	.jump-box{ width:100%; font-size:0.12rem; padding:0.1rem; }
	.jump-box ul li label{ padding-left:0.6rem; }
	.jump-box ul li label span{ width:0.6rem; margin-left:-0.6rem; }
	.jump-box ul li label input{ font-size:0.12rem; }
	.to-top, .to-bottom{ display:none; }
}
</style>

<body>
<form class="jump-box" method="post" action="?">
	<div class="title">当前路由</div>
	<ul>
		{foreach from=$data item=g}
		<li>
			<label><a href="javascript:void(0)"></a><span>本页</span><input type="text" name="file[]" class="readonly" value="{$g->self}" readonly /></label>
			<label><span>展示页面</span><input type="text" name="target[]" value="{$g->target}" /></label>
			<label><span>跳转目标</span><input type="text" class="url" name="url[]" value="{$g->url}" /></label>
			<label><span>备注</span><input type="text" name="mark[]" value="{$g->mark}" /></label>
		</li>
		{/foreach}
	</ul>
	<div class="bottom">
		<a href="javascript:void(0)"></a>
		<a href="javascript:void(0)">保存</a>
	</div>
</form>
<a class="to-top" href="javascript:void(0)"></a>
<a class="to-bottom" href="javascript:void(0)"></a>

{include file="footer.html"}
<script>
$(function(){
	let createUrl = location.protocol+'//'+location.host+'/art/'+location.host.replace(/\./g, '');
	$('.to-top').on('click', function(){
		$.scrollto('.jump-box');
	});
	$('.to-bottom').on('click', function(){
		$.scrollto('.bottom');
	});
	$('.jump-box').on('click', '.readonly', function(){
		$(this).focus().select();
	}).on('click', 'label a', function(){
		$(this).parents('li').remove();
		/*$('.jump-box ul li').each(function(i){
			$(this).find('.readonly').val(createUrl+'/g'+(i+1)+'.html');
			if($(this).find('.url').val().indexOf(createUrl+'/g')>-1)$(this).find('.target').val(createUrl()+'/g'+(i+2)+'.html');
		});*/
	}).find('.bottom a').on('click', function(){
		if($(this).index()===0){
			let ul = $('.jump-box ul'), count = ul.find('li').length;
			let html = '<li>\
				<label><a href="javascript:void(0)"></a><span>本页</span><input type="text" name="file[]" class="readonly" value="'+createUrl+'/g'+(count+1)+'.html" readonly /></label>\
				<label><span>展示页面</span><input type="text" name="target[]" /></label>\
				<label><span>跳转目标</span><input type="text" class="url" name="url[]" value="'+createUrl+'/g'+(count+2)+'.html" /></label>\
				<label><span>备注</span><input type="text" name="mark[]" /></label>\
			</li>';
			ul.append(html);
			return;
		}
		$('.jump-box').submit();
	});
	if(!$('.jump-box ul li').length)$('.bottom a:eq(0)').trigger('click');
});
</script>
