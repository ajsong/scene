.to-top, .to-top:hover{ top:0.1rem; -webkit-transform:rotate(180deg); transform:rotate(180deg); }
@media (max-width: 720px) {
	.jump-box .title{ height:auto; }
	.jump-box .title div{ float:none; clear:both; margin-bottom:0.05rem; }
	.jump-box{ width:100%; font-size:0.12rem; padding:0.1rem; }
	.jump-box ul li label{ padding-left:0.6rem; }
	.jump-box ul li label span{ width:0.6rem; margin-left:-0.6rem; }
	.jump-box ul li label input{ font-size:0.12rem; }
	.to-top, .to-bottom{ display:none; }
}
</style>

<body>
<form class="jump-box" method="post" action="?">
	<input type="hidden" id="url" value="{$data.url}" />
	<div class="title">
		<div>
			当前储存桶
			<select class="list" name="bucket">
				{foreach from=$data.list item=g}
				<option value="{$g}">{$g}</option>
				{/foreach}
			</select>
		</div>
		<div>
			文件夹
			<i class="hidden preloader-gray"></i>
			<select class="dir hidden" search="true" name="dir"></select>
		</div>
		<div>
			<a href="javascript:void(0)">添加文件夹</a>
		</div>
	</div>
	<ul></ul>
	<div class="bottom">
		<a href="javascript:void(0)">保存</a>
	</div>
</form>
<a class="to-top" href="javascript:void(0)"></a>
<a class="to-bottom" href="javascript:void(0)"></a>

{include file="footer.html"}
<script>
let thisUrl = '', createUrl = '', oldUrl = '';
function getBucket(first){
	$('i').removeClass('hidden');
	$('ul').html('');
	let bucket = $('.list').selected().val();
	$.getJSON('/api/jump/getBucket', { bucket:bucket }, function(json){
		$('i').addClass('hidden');
		let html = '', dir = json.data[0];
		if(first && $.localStorage('getDir'))dir = $.localStorage('getDir');
		$.each(json.data, function(){
			html += '<option value="'+this+'" '+(dir===this?'selected':'')+'>'+this+'</option>';
		});
		$('.dir').html(html).removeClass('hidden').selectpicker({ only:'web' });
		thisUrl = 'https://' + $('#url').val() + '/';
		createUrl = thisUrl + '{$data.path}/' + dir;
		if(first)oldUrl = createUrl;
		getFile(bucket, dir);
	});
}
function getFile(bucket, dir){
	$('ul').html('');
	$.overload();
	$.getJSON('/api/jump/getFile', { bucket:bucket, dir:dir }, function(json){
		let ul = $('ul').html('');
		if(!$.isArray(json.data)){
			let html = optionTemplate({
				file: createUrl + '/g1.html',
				url: createUrl + '/g2.html'
			});
			ul.html(html);
			return;
		}
		let html = '';
		$.each(json.data, function(){
			html += optionTemplate({
				file: thisUrl + this.self,
				target: this.target,
				url: this.url,
				mark: this.mark
			});
		});
		ul.html(html);
	});
}
function changeUrl(){
	$('.readonly, .url').each(function(){
		$(this).val($(this).val().replace(oldUrl, createUrl));
	});
	oldUrl = createUrl;
}
function optionTemplate(item){
	return '<li>\
		<label><a href="javascript:void(0)" class="del"></a><span>本页</span><input type="text" name="file[]" class="readonly" value="'+(item.file||'')+'" readonly /></label>\
		<label><a href="javascript:void(0)" class="add"></a><span>展示页面</span><input type="text" name="target[]" value="'+(item.target||'')+'" /></label>\
		<label><span>跳转目标</span><input type="text" class="url" name="url[]" value="'+(item.url||'')+'" /></label>\
		<label><span>备注</span><input type="text" name="mark[]" value="'+(item.mark||'')+'" /></label>\
	</li>';
}
$(function(){
	$('.list').on('change', function(){
		let url = $('#url'), bucket = $(this).selected().val();
		$.localStorage('getBucket', bucket);
		url.val(url.val().replace(/^.+?-(\d+)\./, bucket+'-$1.'));
		getBucket();
	}).selectpicker({ only:'web' });
	if($.localStorage('getBucket')){
		$('.list').selected($.localStorage('getBucket'));
	}else{
		getBucket(true);
	}
	$('.dir').on('change', function(){
		let dir = $(this).selected().val();
		$.localStorage('getDir', dir);
		thisUrl = 'https://' + $('#url').val() + '/';
		createUrl = thisUrl + '{$data.path}/' + dir;
		getFile($('.list').selected().val(), dir);
	});
	$('.jump-box .title > div > a').on('click', function(){
		let dir = prompt('文件夹名称只能字母', '');
		if(!dir || !dir.length)return false;
		let dirs = [];
		$('.dir option').each(function(){
			dirs.push($(this).val());
		});
		if($.inArray(dir, dirs) > -1){
			$.overloadError('该文件夹已存在');
			return false;
		}
		thisUrl = 'https://' + $('#url').val() + '/';
		createUrl = thisUrl + '{$data.path}/' + dir;
		console.log(oldUrl)
		$('.dir').append('<option value="'+dir+'">'+dir+'</option>').selected(dir).selectpicker({ only:'web' });
	});
	$('.to-top').on('click', function(){
		$.scrollto('.jump-box');
	});
	$('.to-bottom').on('click', function(){
		$.scrollto('.bottom');
	});
	$('ul').on('click', '.readonly', function(){
		$(this).focus().select();
	}).on('click', 'label a', function(){
		if($(this).is('.del')){
			if($('ul li').length<=1){
				$.overloadWarning('至少需要一项');
				return;
			}
			$(this).parents('li').remove();
		}else{
			let html = optionTemplate({
				file: createUrl + '/g.html',
				url: createUrl + '/g.html'
			});
			$(this).parent().parent().after(html);
		}
		$('ul li').each(function(i){
			$(this).find('.readonly').val(createUrl+'/g'+(i+1)+'.html');
			if($(this).find('.url').val().indexOf(createUrl+'/g')>-1)$(this).find('.url').val(createUrl+'/g'+(i+2)+'.html');
		});
	});
	$('.jump-box .bottom a').on('click', function(){
		$('.jump-box').submit();
	});
});
</script>
